<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Krishi Seva</title>
    <link rel="icon" href="../static/images/logo.svg" type="image/svg+xml">
    <link rel="stylesheet" href="../static/css/bootstrap.min.css">
    <link rel="stylesheet" href="../static/css/style.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg bg-body-tertiary" data-bs-theme="dark">
        <div class="container-fluid">
          <a class="navbar-brand" href="#">
            <img src="../static/images/logo.svg" alt="" width="30" height="24" class="d-inline-block align-text-top">
            Krishi Seva
          </a>
        </div>
    </nav>

    <div id="carouselExampleSlidesOnly" class="carousel slide" data-bs-ride="carousel">
        <div class="carousel-inner">
            <div class="carousel-item active">
              <div class="carousel-text-wrapper">
                
               <!-- =========== WEATHER CARD ============ -->
<div class="weather-card bg-light p-3 rounded mb-4" style="width: 350px; margin:auto;">
    <h4>🌦️ Weather Forecast</h4>
    <p id="weather-status">Use your location or enter a city.</p>
    <div class="d-grid gap-2 mb-2">
        <button id="use-location-btn" type="button" class="btn btn-outline-success btn-sm">Use my location</button>
    </div>
    <div class="input-group input-group-sm mb-2">
        <input id="city-input" type="text" class="form-control" placeholder="Enter city name" aria-label="City name">
        <button id="city-btn" class="btn btn-outline-primary" type="button">Go</button>
    </div>
    <p id="weather-temp"></p>
    <p id="weather-rain"></p>
</div>
                <!-- ===================================== -->

                <h1 class="carousel-text-title">Crop Disease Recognition</h1>

                <div class="form-box">
                  <form action="/upload/" method="POST" enctype="multipart/form-data">
                    <h1>Upload Image</h1>
                    <div class="input-box d-flex">
                      <input type="file" accept="image/png, image/jpeg" name="img" required>
                    </div>
                    <div class="input-box d-flex">
                      <button type="submit" class="btn btn-success m-auto">Upload</button>
                    </div>
                  </form>

                  {% if result %}
                  <div class="result-container">
                    <div class="result-box">
                      <div class="result-img-container">
                        <img src="{{imagepath}}" alt="uploaded image" class="result-image">
                      </div>
                      <div class="result-text">
                        <h3>{{prediction['name']}}</h3>
                        <p>{{prediction['cause']}}</p>
                        <p>{{prediction['cure']}}</p>
                      </div>
                    </div>
                  </div>
                {% endif %}
                </div>

              </div>
            </div>
        </div>
    </div>

    <script src="../static/js/bootstrap.bundle.min.js"></script>

<!-- ========== WEATHER SCRIPT ========== -->
<script>
    const statusEl = document.getElementById("weather-status");
    const tempEl = document.getElementById("weather-temp");
    const rainEl = document.getElementById("weather-rain");

    function showWeather(data) {
        if (data.error) {
            statusEl.innerHTML = "Error: " + data.message;
            tempEl.innerHTML = "";
            rainEl.innerHTML = "";
            return;
        }

        statusEl.innerHTML = "Location: " + data.location;
        tempEl.innerHTML = "Temperature: " + data.temp + "°C";
        rainEl.innerHTML = "Condition: " + data.description;
    }

    function fetchWeather(url) {
        statusEl.innerHTML = "Fetching weather...";
        fetch(url)
            .then(res => res.json())
            .then(showWeather)
            .catch(() => {
                statusEl.innerHTML = "Failed to fetch weather";
                tempEl.innerHTML = "";
                rainEl.innerHTML = "";
            });
    }

    function useLocation() {
        if (!navigator.geolocation) {
            statusEl.innerHTML = "GPS is not supported in this browser.";
            return;
        }

        navigator.geolocation.getCurrentPosition(
            position => {
                fetchWeather(`/weather?lat=${position.coords.latitude}&lon=${position.coords.longitude}`);
            },
            () => {
                statusEl.innerHTML = "Location permission denied. Try entering a city name instead.";
                tempEl.innerHTML = "";
                rainEl.innerHTML = "";
            }
        );
    }

    function useCity() {
        const city = document.getElementById("city-input").value.trim();
        if (!city) {
            statusEl.innerHTML = "Please enter a city name.";
            return;
        }

        fetchWeather(`/weather?city=${encodeURIComponent(city)}`);
    }

    document.getElementById("use-location-btn").addEventListener("click", useLocation);
    document.getElementById("city-btn").addEventListener("click", useCity);
    document.getElementById("city-input").addEventListener("keydown", function (event) {
        if (event.key === "Enter") {
            event.preventDefault();
            useCity();
        }
    });

    useLocation();
</script>
<!-- =================================== -->

</body>
</html>
